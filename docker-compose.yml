services:
  postgres:
    image: postgres:15
    container_name: shopee_postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: airflow_init
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate && \
        (
          airflow users list | awk 'NR > 2 {print $1}' | grep -qx admin || \
          airflow users create \
            --username admin \
            --password admin \
            --firstname Admin \
            --lastname User \
            --role Admin \
            --email admin@example.com
        )
    environment: &airflow-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "False"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "False"
      AIRFLOW__LOGGING__LOGGING_LEVEL: INFO
      WAREHOUSE_DB_HOST: postgres
      WAREHOUSE_DB_PORT: "5432"
      WAREHOUSE_DB_NAME: shopee_warehouse
      WAREHOUSE_DB_USER: airflow
      WAREHOUSE_DB_PASSWORD: airflow
      SHOPEE_DEMO_BATCH_SIZE: "3000"
    user: "${AIRFLOW_UID:-50000}:0"
    volumes: &airflow-volumes
      - ./dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts
      - ./data:/opt/airflow/data
      - ./logs:/opt/airflow/logs
    restart: "no"

  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: airflow_webserver
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    command: webserver
    ports:
      - "8081:8080"
    environment: *airflow-env
    user: "${AIRFLOW_UID:-50000}:0"
    volumes: *airflow-volumes
    restart: unless-stopped

  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: airflow_scheduler
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    command: scheduler
    environment: *airflow-env
    user: "${AIRFLOW_UID:-50000}:0"
    volumes: *airflow-volumes
    restart: unless-stopped

volumes:
  postgres_data:
